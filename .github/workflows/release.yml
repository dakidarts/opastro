name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -U build twine pytest
          python -m pip install -e ".[dev]"

      - name: Validate Tag Matches Package Version
        run: |
          python - <<'PY'
          import configparser
          import os
          import re

          ref = os.getenv("GITHUB_REF", "")
          match = re.match(r"refs/tags/v(.+)$", ref)
          if not match:
              raise SystemExit(f"Expected tag ref, got: {ref}")
          tag_version = match.group(1)

          cfg = configparser.ConfigParser()
          cfg.read("setup.cfg", encoding="utf-8")
          package_version = cfg.get("metadata", "version", fallback="").strip()
          if not package_version:
              raise SystemExit("Could not read metadata.version from setup.cfg")
          if tag_version != package_version:
              raise SystemExit(
                  f"Tag version mismatch: tag=v{tag_version}, setup.cfg={package_version}"
              )
          print(f"Tag/version validated: v{tag_version}")
          PY

      - name: Run Tests
        run: python -m pytest -q

      - name: Build Distributions
        run: python -m build

      - name: Twine Check
        run: python -m twine check dist/*

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: opastro-dist-${{ github.ref_name }}
          path: dist/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
